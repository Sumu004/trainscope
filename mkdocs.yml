site_name: pytscope
site_description: An intelligence layer for ML training — see why your run is slow, not just that it is.
site_url: https://Sumu004.github.io/pytscope/
repo_name: Sumu004/pytscope
repo_url: https://github.com/Sumu004/pytscope
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

not_in_nav: |
  validation-runs/**
  figures/**

exclude_docs: |
  README.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Overview:
      - Introduction: index.md
      - Usage guide: usage.md
  - Concepts:
      - Architecture: architecture.md
      - Diagnostics reference: diagnostics.md
  - Project:
      - Validation: VALIDATION.md
      - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.highlight
  - pymdownx.inlinehilite

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sumu004/pytscope
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pytscope/
